<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>鹿希武系统 - DUMP 审计面板</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #0a0a0a; color: #d4d4d4; padding: 30px; line-height: 1.6; }
        .container { max-width: 900px; margin: 0 auto; }
        h1 { color: #00ff00; border-bottom: 2px solid #333; padding-bottom: 10px; }
        textarea { width: 100%; height: 150px; background: #1e1e1e; color: #00ff00; border: 1px solid #444; padding: 10px; font-family: monospace; }
        button { background: #00ff00; color: #000; border: none; padding: 10px 20px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .audit-card { background: #161616; border-left: 5px solid #00ff00; padding: 20px; margin-top: 20px; display: none; }
        .logic-alert { color: #ff4500; font-weight: bold; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; font-size: 13px; }
        th, td { border: 1px solid #333; padding: 8px; text-align: center; }
        th { background: #222; }
    </style>
</head>
<body>
    <div class="container">
        <h1>鹿希武系统 • DUMP 数据审计 v1.0</h1>
        <p>1. 请将 Console 抓取的 <code>window.cleanDump</code> 数据粘贴在下方：</p>
        <textarea id="dataInput" placeholder='例如: [{"O":"5005.02","H":"5015.88","L":"4991.26","C":"5005.65"}, ...]'></textarea>
        <button onclick="runAudit()">执行 v3.0 协议审计</button>

        <div id="resultCard" class="audit-card">
            <h3>审计报告：</h3>
            <div id="auditContent"></div>
            <table id="dataTable">
                <thead><tr><th>O</th><th>H</th><th>L</th><th>C</th><th>Spread</th></tr></thead>
                <tbody id="tableBody"></tbody>
            </table>
        </div>
    </div>

    <script>
        function runAudit() {
            const rawData = document.getElementById('dataInput').value;
            try {
                const data = JSON.parse(rawData);
                let html = "";
                const latest = data[0];
                const spread0 = (latest.H - latest.L).toFixed(2);
                
                // 动能审计逻辑
                html += `<p><b>当前 [000] 波幅：</b> ${spread0}</p>`;
                if (spread0 < 10) {
                    html += `<p class="logic-alert">[判定] 动能枯竭，进入摩擦区。建议：观望。</p>`;
                }

                // 渲染表格
                let tableHtml = "";
                data.forEach(d => {
                    const s = (d.H - d.L).toFixed(2);
                    tableHtml += `<tr><td>${d.O}</td><td>${d.H}</td><td>${d.L}</td><td>${d.C}</td><td>${s}</td></tr>`;
                });

                document.getElementById('auditContent').innerHTML = html;
                document.getElementById('tableBody').innerHTML = tableHtml;
                document.getElementById('resultCard').style.display = 'block';
            } catch (e) { alert("数据格式错误，请确保粘贴的是完整的 JSON 数组。"); }
        }
    </script>
</body>
</html>
